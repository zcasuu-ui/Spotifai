<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mio Karaoke Personale</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #0a0a0f;
            color: #ffffff;
            font-family: 'Outfit', 'Segoe UI', sans-serif;
            text-align: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* ── SFONDO ALBUM ART ── */
        #bg-art {
            position: fixed;
            inset: 0;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(60px) brightness(0.3) saturate(1.6);
            transform: scale(1.15);
            transition: background-image 1.2s ease;
            z-index: 0;
        }

        /* overlay scuro per leggibilità */
        #bg-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, rgba(10,10,15,0.45) 0%, rgba(10,10,15,0.85) 100%);
            z-index: 1;
        }

        /* ── SCHERMATA LOGIN ── */
        #login-screen {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 18px;
        }

        #login-screen h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #fff;
        }

        #login-screen p {
            font-size: 15px;
            color: #888;
        }

        #login-btn {
            background: linear-gradient(135deg, #1DB954, #17a348);
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 17px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            letter-spacing: 0.5px;
            box-shadow: 0 0 30px rgba(29,185,84,0.35);
            transition: transform 0.15s, box-shadow 0.15s;
        }

        #login-btn:active { transform: scale(0.96); }

        /* ── APP ── */
        #app {
            display: none;
            position: relative;
            z-index: 10;
            height: 100vh;
            flex-direction: column;
        }

        /* Header con copertina + info traccia */
        #header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px 10px;
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.07);
            flex-shrink: 0;
        }

        #album-thumb {
            width: 52px;
            height: 52px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
            background: #1a1a2e;
            display: none;
            box-shadow: 0 4px 16px rgba(0,0,0,0.5);
        }

        #track-info {
            flex: 1;
            text-align: left;
        }

        #track-name {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 220px;
        }

        #artist-name {
            font-size: 13px;
            color: #aaa;
            margin-top: 2px;
        }

        /* Pulsante Fullscreen */
        #fullscreen-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.18);
            color: #fff;
            border-radius: 10px;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.2s;
            font-size: 18px;
        }

        #fullscreen-btn:active { background: rgba(255,255,255,0.22); }

        /* ── LIRICHE ── */
        #lyrics-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px 80px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            /* nasconde scrollbar */
            scrollbar-width: none;
        }

        #lyrics-container::-webkit-scrollbar { display: none; }

        .lyric-line {
            opacity: 0.28;
            transition: opacity 0.35s ease, transform 0.35s ease, color 0.35s ease;
            margin: 18px 0;
            font-size: 24px;
            font-weight: 400;
            line-height: 1.5;
            padding: 0 8px;
        }

        .active {
            opacity: 1;
            color: #1DB954;
            font-weight: 700;
            transform: scale(1.08);
            text-shadow: 0 0 30px rgba(29,185,84,0.5);
        }

        .prev-1 { opacity: 0.55; }
        .prev-2 { opacity: 0.35; }

        /* ── FULLSCREEN: nascondi header in fullscreen reale su alcuni device ── */
        :fullscreen #header { padding: 18px 20px 12px; }
        :-webkit-full-screen #header { padding: 18px 20px 12px; }

        /* Status pill */
        #status-pill {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 8px 18px;
            font-size: 13px;
            color: #888;
            z-index: 20;
            transition: opacity 0.4s;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="bg-art"></div>
<div id="bg-overlay"></div>

<!-- LOGIN -->
<div id="login-screen">
    <h1>🎤 Karaoke</h1>
    <p>Accedi per sincronizzare i testi con Spotify</p>
    <button id="login-btn" onclick="login()">Accedi con Spotify</button>
</div>

<!-- APP -->
<div id="app">
    <div id="header">
        <img id="album-thumb" src="" alt="Cover">
        <div id="track-info">
            <div id="track-name">Caricamento…</div>
            <div id="artist-name"></div>
        </div>
        <button id="fullscreen-btn" onclick="toggleFullscreen()" title="Schermo intero">
            <svg id="fs-icon-enter" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
                <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
            </svg>
            <svg id="fs-icon-exit" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                <polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/>
                <line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/>
            </svg>
        </button>
    </div>

    <div id="lyrics-container"></div>
</div>

<div id="status-pill">In attesa di riproduzione…</div>

<script>
    const CLIENT_ID    = 'ab7a3dcb7c0647e7a5233c0bbb460220';
    const REDIRECT_URI = 'https://extraordinary-syrniki-c25a7e.netlify.app';
    const SCOPES       = 'user-read-currently-playing user-read-playback-state';

    let currentTrackId = '';
    let lyricsLines    = [];
    let token          = null;

    /* ─── CRYPTO / LOGIN ─── */
    function generateRandomString(length) {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
        return Array.from({length}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
    }

    async function generateCodeChallenge(verifier) {
        const b64url = a => btoa(String.fromCharCode(...new Uint8Array(a)))
            .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        const data = new TextEncoder().encode(verifier);
        return b64url(await crypto.subtle.digest('SHA-256', data));
    }

    async function login() {
        const verifier   = generateRandomString(128);
        const challenge  = await generateCodeChallenge(verifier);
        localStorage.setItem('code_verifier', verifier);
        const p = new URLSearchParams({
            response_type: 'code', client_id: CLIENT_ID,
            scope: SCOPES, redirect_uri: REDIRECT_URI,
            code_challenge_method: 'S256', code_challenge: challenge
        });
        window.location = `https://accounts.spotify.com/authorize?${p}`;
    }

    async function getAccessToken(code) {
        const verifier = localStorage.getItem('code_verifier');
        const p = new URLSearchParams({
            client_id: CLIENT_ID, grant_type: 'authorization_code',
            code, redirect_uri: REDIRECT_URI, code_verifier: verifier
        });
        try {
            const res  = await fetch('https://accounts.spotify.com/api/token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: p
            });
            const data = await res.json();
            if (data.access_token) {
                localStorage.setItem('access_token', data.access_token);
                window.history.pushState({}, document.title, '/');
                startApp(data.access_token);
            }
        } catch (e) { console.error('Token error:', e); }
    }

    /* ─── BOOTSTRAP ─── */
    const urlCode = new URLSearchParams(window.location.search).get('code');
    if (urlCode) {
        getAccessToken(urlCode);
    } else {
        const saved = localStorage.getItem('access_token');
        if (saved) startApp(saved);
    }

    function startApp(t) {
        token = t;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display          = 'flex';
        setInterval(getCurrentlyPlaying, 1000);
    }

    /* ─── SPOTIFY POLLING ─── */
    async function getCurrentlyPlaying() {
        try {
            const res = await fetch('https://api.spotify.com/v1/me/player/currently-playing', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.status === 401) {
                localStorage.removeItem('access_token');
                window.location.reload();
                return;
            }
            if (res.status === 200) {
                const data = await res.json();
                if (data.item) {
                    if (data.item.id !== currentTrackId) {
                        currentTrackId = data.item.id;
                        updateTrackUI(data.item);
                        getLyrics(data.item.name, data.item.artists[0].name);
                    }
                    if (data.progress_ms != null) syncLyrics(data.progress_ms / 1000);
                }
            }
        } catch (e) { /* rete momentaneamente assente */ }
    }

    function updateTrackUI(item) {
        document.getElementById('track-name').textContent = item.name;
        document.getElementById('artist-name').textContent = item.artists.map(a => a.name).join(', ');

        const thumb = document.getElementById('album-thumb');
        const bg    = document.getElementById('bg-art');

        const imgUrl = item.album?.images?.[0]?.url;
        if (imgUrl) {
            thumb.src            = imgUrl;
            thumb.style.display  = 'block';
            bg.style.backgroundImage = `url(${imgUrl})`;
        } else {
            thumb.style.display  = 'none';
            bg.style.backgroundImage = 'none';
        }

        setStatusPill(`${item.name} — ${item.artists[0].name}`);
    }

    /* ─── LRCLIB ─── */
    async function getLyrics(title, artist) {
        const container = document.getElementById('lyrics-container');
        container.innerHTML = '<div class="lyric-line" style="opacity:.5">Cercando il testo… 🎵</div>';
        lyricsLines = [];
        try {
            const url = `https://lrclib.net/api/search?track_name=${encodeURIComponent(title)}&artist_name=${encodeURIComponent(artist)}`;
            const res  = await fetch(url);
            const data = await res.json();

            if (data?.length > 0 && data[0].syncedLyrics) {
                container.innerHTML = '';
                data[0].syncedLyrics.split('\n').forEach((line, i) => {
                    const m = line.match(/\[(\d+):(\d+)\.(\d+)\](.*)/);
                    if (!m) return;
                    const time = parseInt(m[1]) * 60 + parseInt(m[2]);
                    const text = m[4].trim();
                    const div  = document.createElement('div');
                    div.className = 'lyric-line';
                    div.id        = `line-${i}`;
                    div.textContent = text || '🎵';
                    container.appendChild(div);
                    lyricsLines.push({ time, index: i, text });
                });
                setStatusPill('');
            } else {
                container.innerHTML = '<div class="lyric-line" style="opacity:.5">Testo sincronizzato non trovato.</div>';
                setStatusPill('Testo non disponibile');
            }
        } catch {
            container.innerHTML = '<div class="lyric-line" style="opacity:.5">Errore nel caricamento.</div>';
        }
    }

    /* ─── SYNC ─── */
    function syncLyrics(currentTime) {
        let active = null;
        for (const l of lyricsLines) {
            if (currentTime >= l.time) active = l;
            else break;
        }
        if (!active) return;

        document.querySelectorAll('.lyric-line').forEach(el => {
            el.classList.remove('active', 'prev-1', 'prev-2');
        });

        const activeEl = document.getElementById(`line-${active.index}`);
        if (activeEl) {
            activeEl.classList.add('active');
            activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
        // righe precedenti leggermente illuminate
        if (active.index > 0) {
            document.getElementById(`line-${active.index - 1}`)?.classList.add('prev-1');
        }
        if (active.index > 1) {
            document.getElementById(`line-${active.index - 2}`)?.classList.add('prev-2');
        }
    }

    /* ─── FULLSCREEN ─── */
    function toggleFullscreen() {
        const el = document.documentElement;
        const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);

        if (!isFs) {
            (el.requestFullscreen?.() || el.webkitRequestFullscreen?.());
        } else {
            (document.exitFullscreen?.() || document.webkitExitFullscreen?.());
        }
    }

    function onFsChange() {
        const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
        document.getElementById('fs-icon-enter').style.display = isFs ? 'none'  : 'block';
        document.getElementById('fs-icon-exit').style.display  = isFs ? 'block' : 'none';
    }

    document.addEventListener('fullscreenchange',       onFsChange);
    document.addEventListener('webkitfullscreenchange', onFsChange);

    /* ─── STATUS PILL ─── */
    let pillTimer;
    function setStatusPill(msg) {
        const pill = document.getElementById('status-pill');
        clearTimeout(pillTimer);
        if (!msg) { pill.style.opacity = '0'; return; }
        pill.textContent = msg;
        pill.style.opacity = '1';
        pillTimer = setTimeout(() => { pill.style.opacity = '0'; }, 4000);
    }
</script>
</body>
</html>
