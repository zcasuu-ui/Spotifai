name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova project
        run: |
          cordova create build_tmp com.miokaraoke.app "Mio Karaoke"
          cp config.xml build_tmp/config.xml

      - name: Copy index.html (cerca in www/ o nella root)
        run: |
          if [ -f www/index.html ]; then
            cp www/index.html build_tmp/www/index.html
            echo "Trovato in www/"
          elif [ -f index.html ]; then
            cp index.html build_tmp/www/index.html
            echo "Trovato nella root"
          else
            echo "ERRORE: index.html non trovato!"
            find . -name "index.html"
            exit 1
          fi

      - name: Add Android platform
        working-directory: build_tmp
        run: |
          cordova platform add android@12
          cordova plugin add cordova-plugin-whitelist
          cordova plugin add cordova-plugin-inappbrowser

      - name: Build APK (debug)
        working-directory: build_tmp
        run: cordova build android --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: karaoke-debug
          path: build_tmp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
